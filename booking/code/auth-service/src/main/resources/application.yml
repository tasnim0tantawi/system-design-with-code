spring:
  main:
    web-application-type: reactive
  application:
    name: auth-service
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/auth
    username: booking
    password: booking
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    url: jdbc:postgresql://localhost:5432/auth
    user: booking
    password: booking
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-32bytes-min}
  access-ttl-millis: 900000      # 15 minutes
  refresh-ttl-millis: 604800000  # 7 days
