name: shortener

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortener"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [short-net]

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [short-net]

  cassandra:
    image: cassandra:4.1
    ports:
      - "9043:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: shortener-cluster
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [short-net]

  kafka:
    image: apache/kafka-native:3.9.0
    ports:
      - "9093:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    volumes:
      - ./kafka/server.properties:/mnt/shared/config/server.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks: [short-net]

  url-shortener:
    build: .
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/shortener
      SPRING_LIQUIBASE_URL: jdbc:postgresql://postgres:5432/shortener
      SPRING_LIQUIBASE_USER: shortener
      SPRING_LIQUIBASE_PASSWORD: shortener
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_LOCAL_DATACENTER: datacenter1
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SHORTENER_BASE_URL: http://localhost:8090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks: [short-net]

networks:
  short-net:
    driver: bridge
